version: '3.8'

services:

  app:
    build: .
    container_name: credit-risk-app
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    environment:
      - FLASK_ENV=production
    depends_on:
      - mlflow
    restart: always

  mlflow:
    image: python:3.10-slim
    container_name: mlflow-server
    working_dir: /mlflow
    volumes:
      - ./mlruns:/mlflow/mlruns
    ports:
      - "5001:5000"
    command: >
      bash -c "pip install mlflow &&
               mlflow server
               --host 0.0.0.0
               --port 5000
               --backend-store-uri /mlflow/mlruns"
    restart: always
