name: CI/CD - Credit Risk MLOps

on:
  push:
    branches: [ main, develop] 
  pull_request:
    branches: [ main, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install pytest flake8
      - name: Lint
        run: |
          flake8 . --max-line-length=100 \
                   --ignore=E501,W503,E221,E241,E302,E305,E203,E272,E126,F401,W292 \
                   --exclude=venv,mlruns,.github,tests,models
      - name: Tests
        run: |
          mkdir -p tests && touch tests/__init__.py
          [ -f tests/test_app.py ] || echo "def test_placeholder(): pass" > tests/test_app.py
          pytest tests/ -v --tb=short

  build:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/credit-risk-mlops:latest
            ${{ secrets.DOCKER_USERNAME }}/credit-risk-mlops:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy
        run: |
            curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}
            echo "Déploiement déclenché sur Render !"

      - name: Deploy sur AWS EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd Projet_Mlops_Groupe
            git pull origin main
            sudo docker-compose down
            sudo docker-compose up -d 