<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>🏦 Loan Default Predictor</title>

    <!-- ============================================================
         CSS
    ============================================================ -->
    <style>
        /* ── Reset ─────────────────────────────────────────────── */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        /* ── Body ──────────────────────────────────────────────── */
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        /* ── Container ─────────────────────────────────────────── */
        .container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px;
            width: 620px;
            min-width: 580px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }

        /* ── Titre ─────────────────────────────────────────────── */
        h1 {
            text-align: center;
            font-size: 1.8em;
            margin-bottom: 8px;
            color: #00d4ff;
        }

        .subtitle {
            text-align: center;
            color: #aaa;
            margin-bottom: 30px;
            font-size: 0.9em;
        }

        /* ── Formulaire ─────────────────────────────────────────── */
        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.85em;
            color: #ccc;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.08);
            color: white;
            font-size: 1em;
            transition: border 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #00d4ff;
        }

        input::placeholder { color: #666; }

        /* ── Bouton ─────────────────────────────────────────────── */
        button {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            color: white;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,212,255,0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* ── Zone résultat ──────────────────────────────────────── */
        #result {
            margin-top: 25px;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .no-default {
            background: rgba(0,200,100,0.2);
            border: 1px solid #00c864;
            color: #00ff88;
        }

        .default {
            background: rgba(255,60,60,0.2);
            border: 1px solid #ff3c3c;
            color: #ff6b6b;
        }

        /* ── Statut principal ───────────────────────────────────── */
        .result-status {
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 14px;
        }

        /* ── Bloc jauge ─────────────────────────────────────────── */
        .proba-block {
            background: rgba(255,255,255,0.07);
            border-radius: 12px;
            padding: 14px 18px;
            margin-bottom: 16px;
            text-align: left;
        }

        .proba-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.85em;
            color: #ccc;
            white-space: nowrap; 
        }

        .proba-header span:last-child {
            font-weight: bold;
        }

        .proba-bar {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            height: 14px;
            overflow: hidden;
        }

        .proba-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 1s ease;
        }

        .proba-scale {
            display: flex;
            justify-content: space-between;
            font-size: 0.7em;
            color: #888;
            margin-top: 4px;
        }

        /* ── Bloc niveau de risque ──────────────────────────────── */
        .risk-block {
            border-radius: 8px;
            padding: 10px 16px;
            margin-bottom: 16px;
            text-align: left;
            font-size: 0.95em;
            background: rgba(255,255,255,0.05);
        }

        /* ── Bloc décision ──────────────────────────────────────── */
        .decision-block {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 16px 18px;
            text-align: left;
        }

        .decision-title {
            font-size: 1em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .decision-list {
            padding-left: 20px;
            color: #ccc;
            font-size: 0.85em;
            line-height: 1.8;
        }
    </style>
</head>

<body>
<div class="container">
    <h1>🏦 Loan Risk Analyzer</h1>
    <p class="subtitle">Prédiction de défaut de paiement par ML</p>

    <form id="loanForm">
        <div class="form-group">
            <label>💳 Lignes de crédit</label>
            <input type="number" name="credit_lines_outstanding"
                   placeholder="ex: 3" required>
        </div>
        <div class="form-group">
            <label>💰 Montant du prêt ($)</label>
            <input type="number" name="loan_amt_outstanding"
                   placeholder="ex: 15000" required>
        </div>
        <div class="form-group">
            <label>📅 Dette totale ($)</label>
            <input type="number" step="0.01" name="total_debt_outstanding"
                   placeholder="ex: 5000" required>
        </div>
        <div class="form-group">
            <label>📊 Score FICO</label>
            <input type="number" name="fico_score"
                   placeholder="ex: 680" required>
        </div>
        <div class="form-group">
            <label>📆 Ancienneté (années)</label>
            <input type="number" name="years_employed"
                   placeholder="ex: 5" required>
        </div>
        <div class="form-group">
            <label>💵 Revenu annuel ($)</label>
            <input type="number" name="income"
                   placeholder="ex: 50000" required>
        </div>
        <button type="submit">🔍 Analyser le risque</button>
    </form>

    <div id="result"></div>
</div>

<!-- ============================================================
     JAVASCRIPT
============================================================ -->
<script>
    /* ── Constantes de seuil ────────────────────────────────── */
    const SEUILS = [
        {
            max      : 20,
            level    : "Risque Très Faible",
            color    : "#00ff88",
            icon     : "🟢",
            decision : "✅ PRÊT APPROUVÉ",
            details  : [
                "Accorder le prêt sans conditions particulières",
                "Taux d'intérêt standard applicable",
                "Aucune garantie supplémentaire requise"
            ]
        },
        {
            max      : 40,
            level    : "Risque Modéré",
            color    : "#f0c040",
            icon     : "🟡",
            decision : "⚠️ PRÊT SOUS CONDITIONS",
            details  : [
                "Demander des justificatifs de revenus récents",
                "Appliquer un taux d'intérêt majoré (+1 à +2%)",
                "Suivi mensuel du remboursement recommandé"
            ]
        },
        {
            max      : 65,
            level    : "Risque Élevé",
            color    : "#ff9900",
            icon     : "🟠",
            decision : "🔶 PRÊT À RISQUE — RÉVISION REQUISE",
            details  : [
                "Réduire le montant du prêt demandé",
                "Exiger une garantie ou un co-emprunteur",
                "Appliquer un taux majoré (+3 à +5%)",
                "Surveillance renforcée des remboursements"
            ]
        },
        {
            max      : 100,
            level    : "Risque Critique",
            color    : "#ff4444",
            icon     : "🔴",
            decision : "❌ PRÊT REFUSÉ",
            details  : [
                "Risque de défaut trop élevé pour accorder le prêt",
                "Conseiller le client sur l'amélioration de son score FICO",
                "Proposer un micro-crédit supervisé comme alternative",
                "Réévaluer le dossier dans 6 à 12 mois"
            ]
        }
    ];

    /* ── Retourne le bon seuil selon la probabilité ─────────── */
    function getSeuil(p) {
        return SEUILS.find(s => p <= s.max);
    }

    /* ── Construit le HTML du résultat ──────────────────────── */
    function buildResult(data) {
        const p       = data.probability;
        const seuil   = getSeuil(p);
        const liItems = seuil.details
            .map(d => `<li>${d}</li>`)
            .join('');

        return `
            <!-- Statut principal -->
            <div class="result-status">${data.status}</div>

            <!-- Jauge de probabilité -->
            <div class="proba-block">
                <div class="proba-header">
                    <span>
                        📊 Probabilité que le client
                        <strong style="color:white;">ne rembourse PAS</strong>
                        son prêt est de
                    </span>
                    <span style="color:${seuil.color};">${p}%</span>
                </div>

                <div class="proba-bar">
                    <div class="proba-fill" style="
                        width: ${p}%;
                        background: linear-gradient(90deg, #00ff88, ${seuil.color});
                    "></div>
                </div>

                <div class="proba-scale">
                    <span>0% — Sûr</span>
                    <span>50%</span>
                    <span>100% — Défaut certain</span>
                </div>
            </div>

            <!-- Niveau de risque -->
            <div class="risk-block"
                 style="border-left: 4px solid ${seuil.color};">
                ${seuil.icon} Niveau de risque :
                <strong style="color:${seuil.color};">${seuil.level}</strong>
            </div>

            <!-- Décision -->
            <div class="decision-block">
                <div class="decision-title"
                     style="color:${seuil.color};">
                    📋 Décision recommandée : ${seuil.decision}
                </div>
                <ul class="decision-list">${liItems}</ul>
            </div>
        `;
    }

    /* ── Soumission du formulaire ───────────────────────────── */
    document.getElementById('loanForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const form = new FormData(this);
        const btn  = this.querySelector('button');
        const div  = document.getElementById('result');

        btn.textContent = '⏳ Analyse en cours...';
        btn.disabled    = true;

        try {
            const res  = await fetch('/predict', { method: 'POST', body: form });
            const data = await res.json();

            div.style.display = 'block';

            if (data.error) {
                div.className = 'default';
                div.innerHTML = `⚠️ Erreur : ${data.error}`;
            } else {
                div.className = data.prediction === 1 ? 'default' : 'no-default';
                div.innerHTML = buildResult(data);
            }

        } catch (err) {
            div.style.display = 'block';
            div.className     = 'default';
            div.innerHTML     = `⚠️ Erreur de connexion au serveur`;
        }

        btn.textContent = '🔍 Analyser le risque';
        btn.disabled    = false;
    });
</script>

</body>
</html>
